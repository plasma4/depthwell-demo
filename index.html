<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Depthwell</title>
    <style>
        html {
            background-color: black;
            color: white;
            user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            margin: auto;
            padding: 0;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
        }

        ::selection {
            background-color: white;
        }

        #text1,
        #text2,
        #text3,
        #text4,
        #logicText,
        #renderText {
            position: fixed;
            display: none;
            font-family: monospace;
            user-select: text;
            font-size: 20px;
            padding: 2px;
            margin: 4px;
            line-height: 1.1;
            background-color: #0006;
            border-radius: 4px;
            white-space: pre-wrap;
        }

        #text1 {
            color: oklch(0.6206 0.2763 3.18);
            top: 2px;
            left: 2px;
        }

        #text2 {
            color: oklch(80.741% 0.16209 86);
            top: 2px;
            right: 2px;
        }

        #text3 {
            color: oklch(76.85% 0.22766 145);
            bottom: 2px;
            left: 2px;
        }

        #text4 {
            color: oklch(0.5971 0.1875 245);
            bottom: 2px;
            right: 2px;
        }

        #logicText {
            top: -5px;
            left: -3px;
            font-size: 8px;
        }

        #renderText {
            top: -5px;
            right: -3px;
            font-size: 8px;
        }
    </style>
    <script type="module" src="src/main.ts"></script>
</head>

<body>
    <canvas></canvas>
    <span id="text1"></span><span id="text2"></span><span id="text3"></span><span id="text4"></span>
    <span id="logicText"></span><span id="renderText"></span>
</body>

</html>
