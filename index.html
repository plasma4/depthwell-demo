<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Depthwell</title>
    <style>
        html {
            background-color: black;
            color: white;
        }

        canvas {
            display: block;
            position: fixed;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            margin: auto;
            padding: 0;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
        }

        #text {
            position: absolute;
            top: 2px;
            left: 2px;
            font-family: monospace;
            font-size: 18px;
            line-height: 1.1;
            background-color: black;
            border-radius: 4px;
        }
    </style>
    <script type="module" src="src/main.ts"></script>
</head>

<body>
    <canvas></canvas>
    <div id="text">Hi</div>
</body>

</html>
